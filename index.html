<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">CV - Vi Thanh Son</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="page-toolbar">
        <div class="language-switcher">
            <select id="languageSelect"></select>
        </div>
    </div>

    <div class="cv-shell">
        <aside class="sidebar">
            <div class="profile-card" id="profileRoot"></div>
            <div id="sidebarSectionsRoot"></div>
        </aside>

        <main class="main-content" id="mainContentRoot"></main>
    </div>

    <div class="image-lightbox" id="imageLightbox" aria-hidden="true">
        <div class="lightbox-backdrop" data-close-lightbox></div>
        <div class="lightbox-dialog" role="dialog" aria-modal="true" id="lightboxDialog">
            <button type="button" class="lightbox-close" id="closeLightbox">
                <i class="fas fa-times"></i>
            </button>
            <img src="images/avatar.png" alt="" class="lightbox-image" id="lightboxImage">
        </div>
    </div>

    <button id="downloadBtn" aria-label="Export PDF">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/pdf.png" alt="Export PDF">
    </button>

    <script type="module" src="assets/js/script.mjs"></script>
</body>
</html>
